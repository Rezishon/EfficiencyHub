<dialog #dialogRef [id]="id()" class="modal">
  <div class="modal-box flex flex-col items-center w-[30%] border-2 border-primary bg-base-200">
    <fieldset class="fieldset w-full max-w-[70%]">
      <legend class="fieldset-legend">{{ label() }}</legend>
      <input type="text" class="input" [placeholder]="placeholder()" [formControl]="formControl" />
      <p class="label">{{ optionalLabel() }}</p>
    </fieldset>

    <form method="dialog">
      <button (click)="closeModal()" class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">
        <svg lucideCircleX></svg>
      </button>
    </form>

    <div class="join mt-5">
      <button (click)="onSave()" class="btn join-item bg-primary text-primary-content">Save</button>
      <button (click)="closeModal()" class="btn join-item bg-neutral text-neutral-content">
        Draft
      </button>
    </div>
  </div>
</dialog>
